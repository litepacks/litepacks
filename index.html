<!doctype html><html lang=en><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Litepacks</title><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap" rel=stylesheet><style>*{box-sizing:border-box}body{margin:0;height:100vh;display:grid;place-items:center;overflow:hidden;font-family:"Space Grotesk",system-ui,sans-serif;background:linear-gradient(-45deg,#0f172a,#312e81,#2563eb,#06b6d4,#22c55e);background-size:400% 400%;animation:bg 16s ease infinite;color:#fff}body:before{content:"";position:fixed;inset:-50%;background-image:linear-gradient(#ffffff14 1px,transparent 1px),linear-gradient(90deg,#ffffff14 1px,transparent 1px);background-size:42px 42px;mask:radial-gradient(circle at center,#000 28%,transparent 75%);-webkit-mask:radial-gradient(circle at center,#000 28%,transparent 75%);animation:grid 12s linear infinite;z-index:-2}.orb{position:absolute;width:42vmax;height:42vmax;border-radius:50%;background:#ffffff14;filter:blur(70px);animation:float 10s ease-in-out infinite alternate;z-index:-1}.o1{top:-10%;left:-8%}.o2{right:-10%;bottom:-12%;animation-delay:-4s}main{text-align:center;padding:2rem}h1{margin:0;font-size:clamp(4rem,12vw,8rem);font-weight:800;letter-spacing:.15em;text-indent:.18em;text-transform:uppercase;line-height:.95;text-shadow:0 10px 40px rgba(0,0,0,.45),0 0 24px rgba(255,255,255,.08)}p{margin:1.2rem 0 2.2rem;font-size:clamp(1rem,2vw,1.45rem);font-weight:500;opacity:.9}a{display:inline-block;padding:.9rem 1.6rem;border:1px solid #ffffff30;border-radius:999px;background:#ffffff14;color:#fff;text-decoration:none;backdrop-filter:blur(14px);transition:.25s}a:hover{transform:translateY(-3px);background:#ffffff22;box-shadow:0 12px 32px rgba(0,0,0,.3)}@keyframes bg{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}@keyframes grid{to{transform:translate(42px,42px)}}@keyframes float{to{transform:translate(80px,-60px) scale(1.2)}}</style></head><body><div class="orb o1"></div><div class="orb o2"></div><main><h1>LITEPACKS</h1><p>Composable tools. Zero bloat.</p><a href="https://github.com/litepacks">Explore on GitHub →</a></main></body></html>
