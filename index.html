<!doctype html><html lang=en><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Litepacks</title><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel=stylesheet><style>*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;overflow:hidden;background:#0f172a;color:#fff}body{font-family:"Space Grotesk",system-ui,sans-serif}.bg{position:fixed;inset:0;overflow:hidden;background:linear-gradient(-45deg,#0f172a,#312e81,#2563eb,#06b6d4,#22c55e);background-size:400% 400%;animation:bg 18s ease infinite;z-index:0}.bg:before{content:"";position:absolute;inset:-80px;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:42px 42px;mask:radial-gradient(circle,#000 22%,transparent 72%);-webkit-mask:radial-gradient(circle,#000 22%,transparent 72%);animation:grid 16s linear infinite}.orb{position:absolute;width:52vmin;height:52vmin;min-width:260px;min-height:260px;border-radius:50%;background:rgba(255,255,255,.14);filter:blur(72px);will-change:transform}.o1{top:-12%;left:-12%;animation:float1 11s ease-in-out infinite alternate}.o2{right:-14%;bottom:-16%;animation:float2 13s ease-in-out infinite alternate}.wrap{position:relative;z-index:1;width:100%;height:100svh;min-height:520px;display:flex;align-items:center;justify-content:center;padding:clamp(24px,6vw,64px);text-align:center}.content{width:min(100%,980px)}h1{margin:0;font-size:clamp(2.45rem,13vw,8rem);font-weight:800;letter-spacing:clamp(.08em,1.8vw,.18em);text-indent:clamp(.08em,1.8vw,.18em);text-transform:uppercase;line-height:1;overflow-wrap:anywhere;text-shadow:0 10px 40px rgba(0,0,0,.45),0 0 24px rgba(255,255,255,.08)}p{margin:clamp(16px,3vw,24px) 0 clamp(28px,5vw,40px);font-size:clamp(1rem,4vw,1.45rem);font-weight:500;opacity:.9}a{display:inline-flex;align-items:center;justify-content:center;max-width:100%;padding:.95rem 1.7rem;border-radius:999px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#fff;text-decoration:none;transition:.25s;white-space:nowrap}a:hover{transform:translateY(-4px);background:rgba(255,255,255,.2);box-shadow:0 14px 40px rgba(0,0,0,.3)}@keyframes bg{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}@keyframes grid{to{transform:translate3d(42px,42px,0)}}@keyframes float1{to{transform:translate3d(50px,-40px,0) scale(1.15)}}@keyframes float2{to{transform:translate3d(-45px,45px,0) scale(1.12)}}@media(max-width:520px){.wrap{min-height:100svh;padding:24px}h1{font-size:clamp(2.25rem,15vw,4.2rem);letter-spacing:.08em;text-indent:.08em}p{font-size:1rem}a{width:100%;max-width:260px}}@media(prefers-reduced-motion:reduce){.bg,.bg:before,.orb{animation:none}}</style></head><body><div class=bg><div class="orb o1"></div><div class="orb o2"></div></div><main class=wrap><div class=content><h1>Litepacks</h1><p>Composable tools. Zero bloat.</p><a href=https://github.com/litepacks>Explore on GitHub →</a></div></main></body></html>
