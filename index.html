<!doctype html><html lang=en><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Litepacks</title><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel=stylesheet><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}body{display:grid;place-items:center;min-height:100dvh;font-family:"Space Grotesk",system-ui,sans-serif;background:linear-gradient(-45deg,#0f172a,#312e81,#2563eb,#06b6d4,#22c55e);background-size:400% 400%;animation:bg 18s ease infinite;color:#fff;position:relative}body:before{content:"";position:fixed;inset:-50%;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:42px 42px;mask:radial-gradient(circle,#000 28%,transparent 75%);-webkit-mask:radial-gradient(circle,#000 28%,transparent 75%);animation:grid 14s linear infinite;pointer-events:none;z-index:0}.orb{position:fixed;width:42vmax;height:42vmax;border-radius:50%;background:#ffffff18;filter:blur(80px);z-index:0}.o1{top:-10%;left:-8%;animation:float1 10s ease-in-out infinite alternate}.o2{right:-10%;bottom:-12%;animation:float2 12s ease-in-out infinite alternate}main{position:relative;z-index:2;text-align:center;padding:2rem}h1{font-size:clamp(4rem,12vw,8rem);font-weight:800;letter-spacing:.18em;text-indent:.18em;text-transform:uppercase;line-height:.95;text-shadow:0 10px 40px rgba(0,0,0,.45),0 0 24px rgba(255,255,255,.08)}p{margin:1.4rem 0 2.4rem;font-size:clamp(1rem,2vw,1.45rem);font-weight:500;opacity:.9}a{display:inline-block;padding:.95rem 1.7rem;border-radius:999px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);backdrop-filter:blur(14px);color:#fff;text-decoration:none;transition:.25s}a:hover{transform:translateY(-4px);background:rgba(255,255,255,.2);box-shadow:0 14px 40px rgba(0,0,0,.3)}@keyframes bg{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}@keyframes grid{to{transform:translate(42px,42px)}}@keyframes float1{to{transform:translate(80px,-60px) scale(1.2)}}@keyframes float2{to{transform:translate(-70px,70px) scale(1.15)}}</style></head><body><div class="orb o1"></div><div class="orb o2"></div><main><h1>LITEPACKS</h1><p>Composable tools. Zero bloat.</p><a href="https://github.com/litepacks">Explore on GitHub →</a></main></body></html>
